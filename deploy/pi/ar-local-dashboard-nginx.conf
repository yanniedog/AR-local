# AR-local dashboard: HTTP port 80 -> Python server on 127.0.0.1:8808
# Installed by deploy/pi/install-pi-dashboard-proxy.sh as sites-available/ar-local-dashboard

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Netdata at /netdata/ — strip subpath before proxy (APIs live at /api/, not /netdata/api/).
    # https://learn.netdata.cloud/docs/netdata-agent/configuration/securing-agents/running-the-agent-behind-a-reverse-proxy/nginx
    location = /netdata {
        return 301 /netdata/;
    }

    # Cloud SPA deep links (spaces/rooms/...) break when cloud is disabled; send users to local v3 UI.
    location ~ ^/netdata/spaces/ {
        return 302 /netdata/v3/;
    }

    location = /netdata/ {
        return 302 /netdata/v3/;
    }

    location ~ /netdata/(?<ndpath>.*) {
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_pass_request_headers on;
        proxy_store off;
        proxy_pass http://127.0.0.1:19999/$ndpath$is_args$args;
        proxy_buffering off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection_upgrade;
        proxy_read_timeout 300s;
        gzip on;
        gzip_proxied any;
        gzip_types *;
    }

    location / {
        proxy_pass http://127.0.0.1:8808;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
