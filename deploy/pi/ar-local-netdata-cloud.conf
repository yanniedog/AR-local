# AR-local Netdata: local-only UI behind nginx /netdata/ (no Netdata Cloud account).
# Installed to /etc/netdata/netdata.conf.d/ by deploy/pi/install-pi-netdata.sh
# Public URL base is written to $NETDATA_LIB/cloud.d/cloud.conf (cloud base url).

[cloud]
    enabled = no

[web]
    respect do not track policy = yes
    enable gzip compression = no
