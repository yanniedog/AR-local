# Scheduled Pi deploy verification (and optional auto-deploy on drift).
# Secrets: PI_SSH_PRIVATE_KEY, PI_SSH_HOST; TS_OAUTH_CLIENT_ID, TS_OAUTH_SECRET (for hosted runners).
# Variable AR_PI_AUTO_DEPLOY=1 runs --deploy when verify fails.

name: pi-deploy-watchdog

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      deploy_on_drift:
        description: "Run --deploy when verify fails"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  pi-watchdog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Detect Pi SSH secrets
        id: secrets
        run: |
          if [ -n "${{ secrets.PI_SSH_PRIVATE_KEY }}" ] && [ -n "${{ secrets.PI_SSH_HOST }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect Tailscale OAuth
        id: tailscale
        run: |
          if [ -n "${{ secrets.TS_OAUTH_CLIENT_ID }}" ] && [ -n "${{ secrets.TS_OAUTH_SECRET }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Join Tailscale tailnet
        if: steps.secrets.outputs.configured == 'true' && steps.tailscale.outputs.configured == 'true'
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: ${{ secrets.PI_SSH_HOST }}
          version: latest

      - name: Configure SSH for Pi
        if: steps.secrets.outputs.configured == 'true' && steps.tailscale.outputs.configured == 'true'
        env:
          PI_SSH_PRIVATE_KEY: ${{ secrets.PI_SSH_PRIVATE_KEY }}
          PI_SSH_HOST: ${{ secrets.PI_SSH_HOST }}
          PI_SSH_USER: ${{ secrets.PI_SSH_USER }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$PI_SSH_PRIVATE_KEY" > ~/.ssh/pi_deploy_key
          chmod 600 ~/.ssh/pi_deploy_key
          USER="${PI_SSH_USER:-pi}"
          ssh-keyscan -H "$PI_SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          cat >> ~/.ssh/config <<EOF
          Host ar-local-pi5
            HostName ${PI_SSH_HOST}
            User ${USER}
            IdentityFile ~/.ssh/pi_deploy_key
            BatchMode yes
            ConnectTimeout 60
          EOF
          chmod 600 ~/.ssh/config

      - name: Skip (Pi SSH or Tailscale not configured)
        if: steps.secrets.outputs.configured != 'true' || steps.tailscale.outputs.configured != 'true'
        run: |
          echo "pi-deploy-watchdog: skipped (need PI_SSH_* and TS_OAUTH_* for cloud verify)"
          echo "On-Pi ar-local-deploy-watchdog.timer handles drift when GitHub cannot reach the Pi."

      - name: Verify Pi deploy
        id: verify
        if: steps.secrets.outputs.configured == 'true' && steps.tailscale.outputs.configured == 'true'
        env:
          AR_PI_SSH_HOST: ar-local-pi5
          AR_PI_BASE_URL: ${{ vars.AR_PI_BASE_URL }}
          AR_PI_AR_LOCAL_REPO: /srv/ar-local/AR-local
          AR_PI_SITE_REPO: /srv/ar-local/australianrates
        run: |
          set +e
          python pi_deploy_verify.py --verify
          echo "exit=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Deploy on drift (optional)
        if: >-
          steps.secrets.outputs.configured == 'true' &&
          steps.tailscale.outputs.configured == 'true' &&
          steps.verify.outputs.exit != '0' &&
          (
            vars.AR_PI_AUTO_DEPLOY == '1' ||
            github.event.inputs.deploy_on_drift == 'true'
          )
        env:
          AR_PI_SSH_HOST: ar-local-pi5
          AR_PI_BASE_URL: ${{ vars.AR_PI_BASE_URL }}
          AR_PI_AR_LOCAL_REPO: /srv/ar-local/AR-local
          AR_PI_SITE_REPO: /srv/ar-local/australianrates
        run: python pi_deploy_verify.py --deploy

      - name: Fail if still unhealthy
        if: steps.secrets.outputs.configured == 'true' && steps.tailscale.outputs.configured == 'true'
        env:
          VERIFY_EXIT: ${{ steps.verify.outputs.exit }}
          AR_PI_AUTO_DEPLOY: ${{ vars.AR_PI_AUTO_DEPLOY }}
          DEPLOY_INPUT: ${{ github.event.inputs.deploy_on_drift }}
        run: |
          if [ "$VERIFY_EXIT" = "0" ]; then
            exit 0
          fi
          if [ "$AR_PI_AUTO_DEPLOY" = "1" ] || [ "$DEPLOY_INPUT" = "true" ]; then
            python pi_deploy_verify.py --verify
            exit $?
          fi
          echo "pi-deploy-watchdog: verify failed (exit $VERIFY_EXIT)"
          exit 1
