name: app-ci

# Typecheck + lint + unit tests + bundle export for the mobile app, plus pytest for
# app_payload.py. Scoped to relevant paths so it stays out of the way of the banking
# pipeline. EAS cloud builds are manual via mobile-eas-build.yml (needs EXPO_TOKEN).
on:
  pull_request:
    paths:
      - 'mobile/**'
      - 'app_payload.py'
      - 'tests/test_app_payload.py'
      - '.github/workflows/app-ci.yml'
      - '.github/workflows/mobile-eas-build.yml'
      - '.github/workflows/mobile-eas-submit.yml'
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - 'app_payload.py'
      - '.github/workflows/app-ci.yml'
      - '.github/workflows/mobile-eas-build.yml'
      - '.github/workflows/mobile-eas-submit.yml'

jobs:
  mobile:
    name: mobile (typecheck · lint · test · export)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Expo doctor
        run: npx expo-doctor
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test -- --ci
      - name: Export bundle (all platforms)
        run: npm run export

  payload:
    name: payload builder (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pytest
        run: python -m pip install --quiet pytest
      - name: Test
        run: python -m pytest tests/test_app_payload.py -q
