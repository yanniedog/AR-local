name: app-ci

# Typecheck + lint + unit tests + bundle export for the mobile app, plus pytest for
# app_payload.py. Scoped to relevant paths so it stays out of the way of the banking
# pipeline. EAS cloud builds are manual via mobile-eas-build.yml (needs EXPO_TOKEN).
on:
  pull_request:
    paths:
      - 'mobile/**'
      - 'app_payload*.py'
      - 'cdr_*.py'
      - 'pi_*.py'
      - 'payload_crypto.py'
      - 'ar_local_pi_runtime.py'
      - 'cleanup_removed_cdr_sector.py'
      - 'requirements.txt'
      - 'tests/**'
      - '.github/workflows/app-ci.yml'
      - '.github/workflows/mobile-eas-build.yml'
      - '.github/workflows/mobile-eas-submit.yml'
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - 'app_payload*.py'
      - 'cdr_*.py'
      - 'pi_*.py'
      - 'payload_crypto.py'
      - 'ar_local_pi_runtime.py'
      - 'cleanup_removed_cdr_sector.py'
      - 'requirements.txt'
      - 'tests/**'
      - '.github/workflows/app-ci.yml'
      - '.github/workflows/mobile-eas-build.yml'
      - '.github/workflows/mobile-eas-submit.yml'

jobs:
  mobile:
    name: mobile (typecheck Â· lint Â· test Â· export)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Mobile CI (doctor Â· typecheck Â· lint Â· test Â· export)
        run: npm run ci

  payload:
    name: payload builder (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        # cryptography is an optional runtime dep (lazy import) but tests exercise the
        # payload-encryption path, so install it here to run those rather than skip.
        run: python -m pip install --quiet -r requirements.txt cryptography pytest
      - name: Test
        # Run the whole server-side suite (payload, ribbon kernel, ledger
        # enforce/integrity, CDR retry/version-cache/breaker, budget probes, ...) so
        # these guards actually gate, not just test_app_payload.py.
        run: python -m pytest tests/ -q
