# Cloud EAS builds for the Expo mobile app (development / preview / production).
# Manual trigger only — does not gate PR merges.
#
# Secrets (Settings → Secrets and variables → Actions):
#   EXPO_TOKEN — robot access token for yannieyannies-team (expo.dev → Access tokens)
#   GOOGLE_SERVICES_JSON — optional full google-services.json for real Crashlytics (else placeholder)
#   GOOGLE_SERVICE_INFO_PLIST — optional GoogleService-Info.plist for iOS Crashlytics
#   EXPO_PUBLIC_CLARITY_PROJECT_ID — optional Clarity project id (passed to EAS build env)
# EAS project env (expo.dev → project → Environment variables) — alternative to GH secrets:
#   GOOGLE_SERVICES_JSON — file-type env (path injected at build; see ensure-firebase-config.mjs)
#   EXPO_PUBLIC_CLARITY_PROJECT_ID — Microsoft Clarity project id (preview/production builds)
#
# Profiles: mobile/eas.json (development = dev client; preview = internal APK; production = store)
# Project: @yannieyannies-team/ar-local-rates (app.json → expo.extra.eas.projectId)
#
# Firebase files are gitignored. GHA materializes them locally; EAS_NO_VCS + mobile/.easignore
# uploads them to Expo cloud. eas-build-pre-install is a fallback (env / .example) on the builder.

name: mobile-eas-build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile (mobile/eas.json)
        required: true
        default: preview
        type: choice
        options:
          - development
          - preview
          - production
      platform:
        description: Target platform(s)
        required: true
        default: android
        type: choice
        options:
          - android
          - ios
          - all

permissions:
  contents: read

concurrency:
  group: mobile-eas-build-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  eas-build:
    name: eas build (${{ inputs.profile }} · ${{ inputs.platform }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Require EXPO_TOKEN
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::EXPO_TOKEN is not set. Add the ar-local-eas robot token under Settings → Secrets → Actions."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Materialize Firebase config
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > google-services.json
          else
            node scripts/ensure-firebase-config.mjs
          fi
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            printf '%s' "$GOOGLE_SERVICE_INFO_PLIST" > GoogleService-Info.plist
          elif [ ! -f GoogleService-Info.plist ]; then
            node scripts/ensure-firebase-config.mjs
          fi

          if [ -f google-services.json ]; then
            echo "Materialized google-services.json ($(wc -c < google-services.json) bytes)"
            node scripts/validate-firebase-package.mjs
          else
            echo "::warning::google-services.json missing after materialize step"
          fi

      # Fail fast in Actions before uploading to EAS cloud (same Metro bundle step).
      - name: Validate JS bundle (typecheck + export)
        run: |
          npm run typecheck
          case "${{ inputs.platform }}" in
            android) npm run export:android ;;
            ios) npm run export:ios ;;
            all) npm run export ;;
            *)
              echo "Unsupported platform: '${{ inputs.platform }}'" >&2
              exit 1
              ;;
          esac


      - name: Sync Firebase env to EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          sync_string_env() {
            local name="$1"
            local value="$2"
            npx eas-cli@16.14.1 env:create \
              --name "$name" \
              --value "$value" \
              --environment "${{ inputs.profile }}" \
              --visibility secret \
              --non-interactive \
              || npx eas-cli@16.14.1 env:update "${{ inputs.profile }}" \
                --variable-name "$name" \
                --variable-environment "${{ inputs.profile }}" \
                --value "$value" \
                --non-interactive
          }
          sync_file_env() {
            local name="$1"
            local path="$2"
            npx eas-cli@16.14.1 env:create \
              --name "$name" \
              --type file \
              --value "$path" \
              --environment "${{ inputs.profile }}" \
              --visibility secret \
              --non-interactive \
              || npx eas-cli@16.14.1 env:update "${{ inputs.profile }}" \
                --variable-name "$name" \
                --variable-environment "${{ inputs.profile }}" \
                --type file \
                --value "$path" \
                --non-interactive
          }
          if [ -n "${GOOGLE_SERVICES_JSON:-}" ]; then
            GOOGLE_SERVICES_JSON_B64=$(printf '%s' "$GOOGLE_SERVICES_JSON" | base64 -w0)
            sync_string_env GOOGLE_SERVICES_JSON_B64 "$GOOGLE_SERVICES_JSON_B64"
            printf '%s' "$GOOGLE_SERVICES_JSON" > .eas-sync-google-services.json
            sync_file_env GOOGLE_SERVICES_JSON .eas-sync-google-services.json
            rm -f .eas-sync-google-services.json
          fi
          if [ -n "${GOOGLE_SERVICE_INFO_PLIST:-}" ]; then
            GOOGLE_SERVICE_INFO_PLIST_B64=$(printf '%s' "$GOOGLE_SERVICE_INFO_PLIST" | base64 -w0)
            sync_string_env GOOGLE_SERVICE_INFO_PLIST_B64 "$GOOGLE_SERVICE_INFO_PLIST_B64"
            printf '%s' "$GOOGLE_SERVICE_INFO_PLIST" > .eas-sync-GoogleService-Info.plist
            sync_file_env GOOGLE_SERVICE_INFO_PLIST .eas-sync-GoogleService-Info.plist
            rm -f .eas-sync-GoogleService-Info.plist
          fi

      - name: Sync Clarity env to EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_CLARITY_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_CLARITY_PROJECT_ID }}
        run: |
          if [ -n "${EXPO_PUBLIC_CLARITY_PROJECT_ID:-}" ]; then
            set +e
            sync_out=$(mktemp)
            npx eas-cli@16.14.1 env:create \
              --name EXPO_PUBLIC_CLARITY_PROJECT_ID \
              --value "$EXPO_PUBLIC_CLARITY_PROJECT_ID" \
              --environment "${{ inputs.profile }}" \
              --visibility plaintext \
              --non-interactive 2>&1 | tee "$sync_out"
            sync_status=${PIPESTATUS[0]}
            set -e
            if [ "$sync_status" -ne 0 ]; then
              if grep -q 'already has an environment variable named "EXPO_PUBLIC_CLARITY_PROJECT_ID"' "$sync_out"; then
                echo "EXPO_PUBLIC_CLARITY_PROJECT_ID already present on EAS (${{ inputs.profile }}); skipping sync"
              else
                cat "$sync_out"
                exit "$sync_status"
              fi
            fi
            rm -f "$sync_out"
          fi


      - name: Ensure Android keystore (non-interactive)
        if: inputs.platform == 'android' || inputs.platform == 'all'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: node scripts/ensure-eas-android-credentials.mjs

      - name: EAS Build
        id: eas_build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -o pipefail
          EAS_NO_VCS=1 npx eas-cli@16.14.1 build \
            --non-interactive \
            --profile "${{ inputs.profile }}" \
            --platform "${{ inputs.platform }}" 2>&1 | tee /tmp/eas-build.log
          status=${PIPESTATUS[0]}
          build_id=$(grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' /tmp/eas-build.log | tail -1 || true)
          if [ -n "$build_id" ]; then
            echo "eas_build_id=$build_id" >> "$GITHUB_OUTPUT"
            echo "EAS build: https://expo.dev/accounts/yannieyannies-team/projects/ar-local-rates/builds/$build_id"
          fi
          if [ "$status" -ne 0 ] && [ -n "$build_id" ]; then
            node scripts/fetch-eas-build-error.mjs "$build_id" || true
          fi
          exit "$status"

      - name: Build queued
        run: |
          echo "Track the build at https://expo.dev/accounts/yannieyannies-team/projects/ar-local-rates/builds"
          echo "Tip: EXPO_TOKEN=… eas build:view <id> --json   (build:view has no --non-interactive flag)"
