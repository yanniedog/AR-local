# Deploy Pi runtime after every push to main (squash merges included).
# Does not gate PR merges — job succeeds when secrets are absent; deploy step uses continue-on-error.
#
# Secrets (Settings → Secrets and variables → Actions):
#   PI_SSH_PRIVATE_KEY  — private key for Pi SSH (ed25519 recommended)
#   PI_SSH_HOST         — host or IP (e.g. 100.78.28.10)
# Optional secrets:
#   PI_SSH_USER         — default pi
# Optional variables:
#   AR_PI_BASE_URL      — smoke URL (default http://100.78.28.10:8808/ when unset)
# SSH Host alias ar-local-pi5 must match docs/UNIVERSAL_ROADMAP.md (~/.ssh/config).

name: pi-deploy-on-main

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print deploy steps only (no remote changes)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  pi-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Detect Pi SSH secrets
        id: secrets
        run: |
          if [ -n "${{ secrets.PI_SSH_PRIVATE_KEY }}" ] && [ -n "${{ secrets.PI_SSH_HOST }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure SSH for Pi
        if: steps.secrets.outputs.configured == 'true'
        env:
          PI_SSH_PRIVATE_KEY: ${{ secrets.PI_SSH_PRIVATE_KEY }}
          PI_SSH_HOST: ${{ secrets.PI_SSH_HOST }}
          PI_SSH_USER: ${{ secrets.PI_SSH_USER }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$PI_SSH_PRIVATE_KEY" > ~/.ssh/pi_deploy_key
          chmod 600 ~/.ssh/pi_deploy_key
          USER="${PI_SSH_USER:-pi}"
          ssh-keyscan -H "$PI_SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          cat >> ~/.ssh/config <<EOF
          Host ar-local-pi5
            HostName ${PI_SSH_HOST}
            User ${USER}
            IdentityFile ~/.ssh/pi_deploy_key
            BatchMode yes
            ConnectTimeout 20
          EOF
          chmod 600 ~/.ssh/config

      - name: Skip (Pi SSH secrets not configured)
        if: steps.secrets.outputs.configured != 'true'
        run: |
          echo "pi-deploy-on-main: skipped — set PI_SSH_PRIVATE_KEY and PI_SSH_HOST in repo Actions secrets"
          echo "Merge to main is not blocked; configure secrets to enable automatic Pi deploy."

      - name: Deploy Pi (pull main + restart + smoke)
        if: steps.secrets.outputs.configured == 'true'
        env:
          AR_PI_SSH_HOST: ar-local-pi5
          AR_PI_BASE_URL: ${{ vars.AR_PI_BASE_URL }}
        run: |
          export AR_PI_BASE_URL="${AR_PI_BASE_URL:-http://100.78.28.10:8808/}"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python pi_deploy_verify.py --deploy --dry-run
          else
            python pi_deploy_verify.py --deploy
          fi
        continue-on-error: true

      - name: Deploy result
        if: steps.secrets.outputs.configured == 'true'
        run: |
          echo "pi-deploy-on-main: finished (see Deploy Pi step for exit code; failures do not fail this workflow)"
