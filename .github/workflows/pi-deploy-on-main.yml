# Deploy Pi runtime after every push to main (squash merges included).
# Does not gate PR merges.
#
# Secrets (Settings → Secrets and variables → Actions):
#   PI_SSH_PRIVATE_KEY, PI_SSH_HOST — required for deploy step
#   TS_OAUTH_CLIENT_ID, TS_OAUTH_SECRET — required for GitHub-hosted runners (Pi is on Tailscale)
# Optional: PI_SSH_USER (default pi), variable AR_PI_BASE_URL
#
# Without Tailscale OAuth secrets, use on-Pi timer (ar-local-deploy-watchdog) which pulls on drift.

name: pi-deploy-on-main

on:
  push:
    branches: [main]
    paths-ignore:
      - 'reports/**'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print deploy steps only (no remote changes)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: pi-deploy-on-main
  cancel-in-progress: false

jobs:
  pi-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Detect Pi SSH secrets
        id: secrets
        run: |
          if [ -n "${{ secrets.PI_SSH_PRIVATE_KEY }}" ] && [ -n "${{ secrets.PI_SSH_HOST }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect runner environment
        id: runner_env
        run: |
          # runner.environment is not a valid context; use self-hosted label instead.
          if echo "${{ join(runner.labels, ' ') }}" | grep -qE '(^| )self-hosted( |$)'; then
            echo "requires_tailscale=false" >> "$GITHUB_OUTPUT"
          else
            echo "requires_tailscale=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect Tailscale OAuth (hosted runner → tailnet)
        id: tailscale
        run: |
          if [ -n "${{ secrets.TS_OAUTH_CLIENT_ID }}" ] && [ -n "${{ secrets.TS_OAUTH_SECRET }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Join Tailscale tailnet
        if: >-
          steps.secrets.outputs.configured == 'true' &&
          steps.runner_env.outputs.requires_tailscale == 'true' &&
          steps.tailscale.outputs.configured == 'true'
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: ${{ secrets.PI_SSH_HOST }}
          version: latest

      - name: Configure SSH for Pi
        if: steps.secrets.outputs.configured == 'true'
        env:
          PI_SSH_PRIVATE_KEY: ${{ secrets.PI_SSH_PRIVATE_KEY }}
          PI_SSH_HOST: ${{ secrets.PI_SSH_HOST }}
          PI_SSH_USER: ${{ secrets.PI_SSH_USER }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$PI_SSH_PRIVATE_KEY" > ~/.ssh/pi_deploy_key
          chmod 600 ~/.ssh/pi_deploy_key
          USER="${PI_SSH_USER:-pi}"
          ssh-keyscan -H "$PI_SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          cat >> ~/.ssh/config <<EOF
          Host ar-local-pi5
            HostName ${PI_SSH_HOST}
            User ${USER}
            IdentityFile ~/.ssh/pi_deploy_key
            BatchMode yes
            ConnectTimeout 60
          EOF
          chmod 600 ~/.ssh/config

      - name: Skip (Pi SSH secrets not configured)
        if: steps.secrets.outputs.configured != 'true'
        run: |
          echo "pi-deploy-on-main: skipped — set PI_SSH_PRIVATE_KEY and PI_SSH_HOST"
          echo "On-Pi ar-local-deploy-watchdog.timer still syncs within ~15 minutes."

      - name: Skip deploy (Tailscale OAuth missing for hosted runner)
        if: >-
          steps.secrets.outputs.configured == 'true' &&
          steps.runner_env.outputs.requires_tailscale == 'true' &&
          steps.tailscale.outputs.configured != 'true'
        run: |
          echo "::warning::PI_SSH_* set but TS_OAUTH_CLIENT_ID/TS_OAUTH_SECRET missing — GitHub cloud cannot reach Tailscale-only Pi."
          echo "Add Tailscale OAuth secrets (see docs/UNIVERSAL_ROADMAP.md) or use a self-hosted runner on the tailnet."

      - name: Deploy Pi (pull main + restart + smoke)
        if: >-
          steps.secrets.outputs.configured == 'true' &&
          (
            steps.runner_env.outputs.requires_tailscale != 'true' ||
            steps.tailscale.outputs.configured == 'true'
          )
        env:
          AR_PI_SSH_HOST: ar-local-pi5
          AR_PI_BASE_URL: ${{ vars.AR_PI_BASE_URL }}
          AR_PI_AR_LOCAL_REPO: /srv/ar-local/AR-local
          AR_PI_SITE_REPO: /srv/ar-local/australianrates
        run: |
          export AR_PI_BASE_URL="${AR_PI_BASE_URL:-http://100.78.28.10/}"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python pi_deploy_verify.py --deploy --dry-run
          else
            python pi_deploy_verify.py --deploy
          fi

      - name: Deploy result
        if: >-
          steps.secrets.outputs.configured == 'true' &&
          (
            steps.runner_env.outputs.requires_tailscale != 'true' ||
            steps.tailscale.outputs.configured == 'true'
          )
        run: |
          echo "pi-deploy-on-main: finished (see Deploy Pi step log)"
