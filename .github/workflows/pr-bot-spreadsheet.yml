name: pr-bot-spreadsheet

# Maintain an in-repo matrix (HTML + JSON): rows = merged PRs, columns = review bots,
# color-coded by feedback presence, address-before-merge, and quota/limit hits.
on:
  schedule:
    - cron: '0 6 * * *'
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      limit:
        description: Max merged PRs to sync
        required: false
        default: '50'
      pr_number:
        description: Optional single PR number
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-bot-spreadsheet
  cancel-in-progress: false

jobs:
  sync-matrix:
    if: >-
      github.event_name == 'schedule'
      || github.event_name == 'workflow_dispatch'
      || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Sync PR bot matrix to repo artifacts
        env:
          GH_TOKEN: ${{ secrets.BOT_GATE_TOKEN || github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          ARGS=(--limit "${{ inputs.limit || '50' }}")
          if [ -n "${{ inputs.pr_number }}" ]; then
            ARGS+=(--pr "${{ inputs.pr_number }}")
          fi
          # Merged-PR events run a full sync (no --pr) so the committed matrix keeps
          # all rows; single-PR mode is workflow_dispatch only and upserts via sync.
          npm run pr:bot-spreadsheet:sync -- "${ARGS[@]}"
      - name: Commit and push matrix via PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/pr-bot-matrix.html reports/pr-bot-matrix.json
          if git diff --staged --quiet; then
            echo "Matrix unchanged - no commit"
            exit 0
          fi
          BRANCH="bot/pr-bot-matrix-sync"
          git checkout -B "$BRANCH"
          git commit --trailer "Co-authored-by: Cursor <cursoragent@cursor.com>" -m "chore: update PR bot feedback matrix"
          git push origin "$BRANCH" --force-with-lease
          EXISTING=$(gh pr list --head "$BRANCH" --base main --state open --json number -q '.[0].number' || true)
          if [ -z "$EXISTING" ]; then
            gh pr create --base main --head "$BRANCH" --title "chore: update PR bot feedback matrix" --body "Automated sync from pr-bot-spreadsheet workflow.

Made with [Cursor](https://cursor.com)"
          else
            echo "Open PR #$EXISTING already tracks $BRANCH"
          fi
          if ! gh pr merge "$BRANCH" --squash --auto --delete-branch; then
            echo "::warning::Could not enable auto-merge; merge the open bot PR manually after checks pass"
          fi
