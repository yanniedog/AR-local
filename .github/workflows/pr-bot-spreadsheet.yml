name: pr-bot-spreadsheet

# Maintain an in-repo matrix (HTML + JSON): rows = merged PRs, columns = review bots,
# color-coded by feedback presence, address-before-merge, and quota/limit hits.
on:
  schedule:
    - cron: '0 6 * * *'
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      limit:
        description: Max merged PRs to sync
        required: false
        default: '50'
      pr_number:
        description: Optional single PR number
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: pr-bot-spreadsheet
  cancel-in-progress: false

jobs:
  sync-matrix:
    if: >-
      github.event_name == 'schedule'
      || github.event_name == 'workflow_dispatch'
      || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Sync PR bot matrix to repo artifacts
        env:
          GH_TOKEN: ${{ secrets.BOT_GATE_TOKEN || github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          ARGS=(--limit "${{ inputs.limit || '50' }}")
          if [ -n "${{ inputs.pr_number }}" ]; then
            ARGS+=(--pr "${{ inputs.pr_number }}")
          fi
          # Merged-PR events run a full sync (no --pr) so the committed matrix keeps
          # all rows; single-PR mode is workflow_dispatch only and upserts via sync.
          npm run pr:bot-spreadsheet:sync -- "${ARGS[@]}"
      - name: Commit and push matrix to main
        run: npm run pr:bot-matrix:commit
