name: pr-bot-feedback-check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  bot-feedback-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Review thread closure gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: npm run pr:bot-feedback-check -- --pr ${{ github.event.pull_request.number }}
