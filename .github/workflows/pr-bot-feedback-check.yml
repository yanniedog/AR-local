name: pr-bot-feedback-check

# Thread closure gate. Runs on PR lifecycle AND on review-comment activity so an
# in-thread reply (or a bot posting a finding) re-evaluates the gate automatically
# — no manual re-run / empty re-trigger commit needed. One paginated GraphQL query
# per run; cancel-in-progress:false keeps volume bounded without cancelled runs.
# NOTE: GitHub emits no event when a thread is *resolved*, so a resolve-only round
# (no reply, no push) won't auto-re-run a previously-failed gate. After resolving,
# post a reply or any PR comment, push, or re-run THIS run on the PR head:
# `gh run rerun <run-id>`. A bare `gh workflow run … -f pr_number` dispatches on
# the default branch (omitting --ref), so its check attaches to main's HEAD, not
# the PR head. Triggers cover review, inline review-comment, AND top-level
# issue_comment so any of those documented actions re-evaluate the gate.
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read
  issues: read

concurrency:
  # MUST be false for a required check — cancelling an in-flight run leaves a
  # "cancelled" check-run that branch protection reads as the latest required
  # status, blocking the PR even when a later run succeeds (the "BLOCKED but
  # all-green" trap). With false the newest event runs to completion, so the
  # latest required check-run is always success/failure, never a stale cancel.
  group: bot-feedback-gate-${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number || github.run_id }}
  cancel-in-progress: false

jobs:
  bot-feedback-gate:
    # issue_comment fires for both issues and PRs — gate on PR-only.
    if: >-
      github.event.pull_request != null
      || github.event.review != null
      || (github.event_name == 'issue_comment' && github.event.issue.pull_request != null)
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Review thread closure gate
        env:
          GH_TOKEN: ${{ secrets.BOT_GATE_TOKEN || github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR="${{ inputs.pr_number }}"
          elif [ "${{ github.event_name }}" = "issue_comment" ]; then
            PR="${{ github.event.issue.number }}"
          else
            PR="${{ github.event.pull_request.number }}"
          fi
          set +e
          npm run pr:bot-feedback-check -- --pr "$PR" --skip-bot-presence
          code=$?
          set -e
          if [ "$code" -eq 2 ]; then
            echo "::warning::GitHub API rate limit — re-run after quota resets"
            exit 1
          fi
          exit "$code"
