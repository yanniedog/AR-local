name: pr-bot-feedback-check

# Thread closure gate on PR lifecycle only — not on every review/comment (GraphQL heavy).
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: bot-feedback-gate-${{ github.event.pull_request.number || inputs.pr_number || github.run_id }}
  cancel-in-progress: true

jobs:
  bot-feedback-gate:
    if: github.event.pull_request != null || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Review thread closure gate
        env:
          GH_TOKEN: ${{ secrets.BOT_GATE_TOKEN || github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR="${{ inputs.pr_number }}"
          else
            PR="${{ github.event.pull_request.number }}"
          fi
          set +e
          npm run pr:bot-feedback-check -- --pr "$PR" --skip-bot-presence
          code=$?
          set -e
          if [ "$code" -eq 2 ]; then
            echo "::warning::GitHub API rate limit — re-run after quota resets"
            exit 1
          fi
          exit "$code"
