# Free unlimited Android preview APK builds on GitHub Actions (no EAS cloud quota).
# Produces a signed release APK and publishes to:
#   Rolling:   app-apk-latest  (manifest app-apk-latest.json for in-app self-update)
#   Versioned: app-v{semver}   e.g. app-v1.0.0 â€” title "Australian Rates app â€” {version} (Android)"
# Both releases ship app-preview.apk, app-preview-qr.png, and install.html.
#
# Secrets (Settings â†’ Secrets and variables â†’ Actions):
#   GOOGLE_SERVICES_JSON â€” optional; materialized via ensure-firebase-config.mjs
#   GOOGLE_SERVICE_INFO_PLIST â€” optional
#   EXPO_TOKEN â€” optional; used to download EAS Android keystore when ANDROID_KEYSTORE_B64 unset
#   ANDROID_KEYSTORE_B64 â€” optional override; base64 .jks/.keystore
#   ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD â€” with B64 override
#
# Signing: prefers ANDROID_KEYSTORE_* secrets; else fetches default keystore from EAS credentials.

name: mobile-android-apk

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-android-apk.yml'

permissions:
  contents: write

concurrency:
  group: mobile-android-apk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android-apk:
    name: android preview apk (GHA)
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        env:
          NODE_ENV: development
        run: npm ci --no-audit --no-fund

      - name: Materialize Firebase config
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          node scripts/ensure-firebase-config.mjs
          node scripts/validate-firebase-package.mjs

      - name: Bump Android versionCode from rolling manifest
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/bump-android-version-code.mjs --repo "${{ github.repository }}"

      - name: Materialize Android release keystore
        id: keystore
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: node scripts/materialize-android-keystore.mjs

      - name: Validate JS bundle (typecheck + export)
        run: |
          npm run typecheck
          npm run export:android

      - name: Expo prebuild (android)
        run: npx expo prebuild --platform android --no-install

      - name: Gradle assembleRelease
        env:
          KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
          KEYSTORE_PASSWORD: ${{ steps.keystore.outputs.store_password }}
          KEY_ALIAS: ${{ steps.keystore.outputs.key_alias }}
          KEY_PASSWORD: ${{ steps.keystore.outputs.key_password }}
        run: |
          set -euo pipefail
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Locate release APK
        id: apk
        run: |
          set -euo pipefail
          apk=$(find android/app/build/outputs/apk -name '*-release.apk' -type f | head -1)
          if [ -z "$apk" ]; then
            echo "::error::No release APK found under android/app/build/outputs/apk"
            exit 1
          fi
          echo "path=$apk" >> "$GITHUB_OUTPUT"
          ls -lh "$apk"

      - name: Publish preview APK manifest (GitHub release)
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          node scripts/publish-apk-manifest.mjs --apk "${{ steps.apk.outputs.path }}" \
            --repo "${{ github.repository }}"

      - name: Update README Android install QR section
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node scripts/update-readme-app-install.mjs \
            --repo "${{ github.repository }}" \
            --manifest build/apk-publish/app-apk-latest.json
          cd "$GITHUB_WORKSPACE"
          if git diff --quiet README.md; then
            echo "README.md unchanged — skip commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            version=$(node -p "require('./mobile/app.json').expo.version")
            git commit -m "docs: refresh Android install QR (v${version}) [skip ci]"
            if ! git push origin HEAD:refs/heads/main; then
              echo "::warning::README commit not pushed (protected main). Open a docs PR from main or merge bot sync."
            fi
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-preview-apk
          path: |
            mobile/build/apk-publish/app-preview.apk
            mobile/build/apk-publish/app-preview-qr.png
            mobile/build/apk-publish/install.html
          if-no-files-found: error
