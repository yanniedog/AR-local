name: pr-bot-presence-gate

# Single-shot bot presence check on PR lifecycle only. Bot wait polling (--watch) is local
# (npm run wait-for-bots) — do not poll GraphQL from Actions (installation quota).
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: bot-presence-gate-${{ github.event.pull_request.number || inputs.pr_number || github.run_id }}
  cancel-in-progress: true

jobs:
  bot-presence-gate:
    if: github.event.pull_request != null || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Required bot wait gate (single shot)
        env:
          GH_TOKEN: ${{ secrets.BOT_GATE_TOKEN || github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          AR_BOT_WAIT_REQUIRED: gemini,codex,sourcery
          BOT_WAIT_IGNORE_CHECK_NAMES: bot-presence-gate,bot-feedback-gate,pr-bot-presence-gate,pr-bot-feedback-check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR="${{ inputs.pr_number }}"
          else
            PR="${{ github.event.pull_request.number }}"
          fi
          set +e
          npm run wait-for-bots -- --pr "$PR"
          code=$?
          set -e
          if [ "$code" -eq 2 ]; then
            echo "::warning::Bot wait not ready yet (exit 2) — run npm run wait-for-bots locally until exit 0, then re-run this workflow"
            exit 1
          fi
          exit "$code"
