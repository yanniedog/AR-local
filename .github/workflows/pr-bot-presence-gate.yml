name: pr-bot-presence-gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  bot-presence-gate:
    if: github.event_name != 'issue_comment' || github.event.issue.pull_request
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Required bot wait gate
        env:
          GH_TOKEN: ${{ github.token }}
          AR_BOT_WAIT_REQUIRED: gemini,codex,sourcery
          BOT_WAIT_IGNORE_CHECK_NAMES: bot-presence-gate,pr-bot-feedback-check,required-bot-wait
        run: npm run wait-for-bots -- --watch --pr ${{ github.event.pull_request.number || github.event.issue.number }}
