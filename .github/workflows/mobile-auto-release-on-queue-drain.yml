# Auto mobile release when the last open PR to main is squash-merged.
#
# Logic:
#   1. pull_request closed + merged → count open PRs targeting main
#   2. count > 1 → exit (more work in flight)
#   3. count == 1 → poll briefly (simultaneous last-two merge race)
#   4. count == 0 → bump expo.version patch in mobile/app.json, push main
#   5. push to mobile/** triggers mobile-android-apk.yml (versionCode bump + APK publish)
#
# Direct pushes to main do not trigger this workflow (PR merge close only).
# Concurrency serializes drain checks so only one auto-bump runs per queue drain.

name: mobile-auto-release-on-queue-drain

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: mobile-auto-release-on-drain
  cancel-in-progress: false

jobs:
  maybe-release:
    if: github.event.pull_request.merged == true
    name: bump app version when queue drained
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Queue drained → patch bump + push (APK via mobile-android-apk)
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: node mobile/scripts/mobile-auto-release-on-drain.mjs
