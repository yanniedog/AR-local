# Auto mobile release when the last open PR to main is squash-merged.
# Bumps expo.version and pushes directly to main (gate-exempt PR fallback).
# See docs/HANDOFF.md for ruleset bypass setup.

name: mobile-auto-release-on-queue-drain

on:
  workflow_dispatch:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: mobile-auto-release-on-drain
  cancel-in-progress: false

jobs:
  maybe-release:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    name: bump app version when queue drained
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Queue drained â†’ patch bump to main (APK via mobile-android-apk)
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha || '' }}
        run: node mobile/scripts/mobile-auto-release-on-drain.mjs
